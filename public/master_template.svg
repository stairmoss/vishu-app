<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
    <!-- Background Gradient -->
    <defs>
        <radialGradient id="bgGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
            <stop offset="0%" stop-color="#3b240b" />
            <stop offset="100%" stop-color="#110A05" />
        </radialGradient>
        <linearGradient id="goldBorder" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FCD565" />
            <stop offset="50%" stop-color="#D4AF37" />
            <stop offset="100%" stop-color="#8B5A2B" />
        </linearGradient>
    </defs>
    
    <!-- Base -->
    <rect width="1080" height="1920" fill="url(#bgGradient)" />
    
    <!-- Outer Border -->
    <rect x="40" y="40" width="1000" height="1840" fill="none" stroke="url(#goldBorder)" stroke-width="12" rx="20" />
    <rect x="60" y="60" width="960" height="1800" fill="none" stroke="url(#goldBorder)" stroke-width="4" rx="10" />

    <!-- Corner Decorative Elements -->
    <!-- Top Left -->
    <path d="M 60 260 L 60 60 L 260 60" fill="none" stroke="url(#goldBorder)" stroke-width="8" />
    <circle cx="100" cy="100" r="15" fill="url(#goldBorder)" />
    
    <!-- Top Right -->
    <path d="M 1020 260 L 1020 60 L 820 60" fill="none" stroke="url(#goldBorder)" stroke-width="8" />
    <circle cx="980" cy="100" r="15" fill="url(#goldBorder)" />
    
    <!-- Bottom Left -->
    <path d="M 60 1660 L 60 1860 L 260 1860" fill="none" stroke="url(#goldBorder)" stroke-width="8" />
    <circle cx="100" cy="1820" r="15" fill="url(#goldBorder)" />
    
    <!-- Bottom Right -->
    <path d="M 1020 1660 L 1020 1860 L 820 1860" fill="none" stroke="url(#goldBorder)" stroke-width="8" />
    <circle cx="980" cy="1820" r="15" fill="url(#goldBorder)" />

    <!-- Top Text Title -->
    <text x="540" y="250" font-family="Arial, sans-serif" font-size="90" font-weight="bold" fill="url(#goldBorder)" text-anchor="middle" letter-spacing="8">HAPPY VISHU</text>
    <text x="540" y="320" font-family="Arial, sans-serif" font-size="40" font-style="italic" fill="#FFEDB3" text-anchor="middle" letter-spacing="4">May this year bring prosperity and joy</text>

    <!-- Center QR Code Base Box (QR code will be placed here by canvas) -->
    <rect x="290" y="800" width="500" height="500" rx="30" fill="url(#bgGradient)" stroke="url(#goldBorder)" stroke-width="10" />
    <text x="540" y="1380" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#D4AF37" text-anchor="middle" letter-spacing="2">SCAN TO SEND KAINEETAM</text>
</svg>
